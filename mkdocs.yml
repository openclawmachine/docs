site_name: CLAW MACHINE
site_description: OpenClawMachine reduced launch docs. Live now for graded price lookup and purchase analysis.
repo_url: https://github.com/openclawmachine/docs
edit_uri: edit/main/

nav:
  - Agent Integration (skill.md): skill.md
  - Home: index.md
  - Quick Start: quickstart.md
  - Operations: operations.md
  - How It Works: how-it-works.md
  - Economics: economics.md
  - Solvency: solvency.md
  - Token Launch: token-launch.md
  - ACP Integration: acp-overview.md
  - Agent Services: agent-services.md
  - Mystery Gift: mystery-gift-integration.md
  - Chain Support: chain-support.md
  - FAQ: faq.md

theme:
  name: terminal

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - https://cdn.jsdelivr.net/npm/@fontsource/maple-mono@5.0.2/css/maple-mono-webfont.css
  - styles.css

extra:
  social:
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mysterygift
    - icon: fontawesome/brands/discord
      link: https://discord.gg/mysterygift

plugins:
  - search
  - mermaid2
